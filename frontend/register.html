<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — RoadShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="brand">Road<span>Share</span></a>
      <div class="nav-links">
        <a href="login.html">Log in</a>
      </div>
    </nav>
  </header>

  <main class="form-page">
    <h1>Create your account</h1>
    <p class="form-sub">Rent a car, or list your own to earn from it.</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="role">I want to</label>
        <select id="role" required>
          <option value="customer">Rent cars (Customer)</option>
          <option value="owner">List my car (Owner)</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create account</button>
      <p class="form-error" id="registerError"></p>
    </form>

    <p class="form-footer-link">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
