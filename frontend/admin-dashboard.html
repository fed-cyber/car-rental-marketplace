<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin dashboard — RoadShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="brand">Road<span>Share</span></a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Admin dashboard</h1>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="users">Users</button>
      <button class="tab-btn" data-tab="listings">Listings</button>
      <button class="tab-btn" data-tab="reviews">Reviews</button>
    </div>

    <section id="tab-users" class="tab-panel active">
      <div id="usersList"></div>
    </section>

    <section id="tab-listings" class="tab-panel">
      <div id="listingsList"></div>
    </section>

    <section id="tab-reviews" class="tab-panel">
      <div id="reviewsList"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
