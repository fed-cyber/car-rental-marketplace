<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — RoadShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="brand">Road<span>Share</span></a>
      <div class="nav-links">
        <a href="register.html">Create account</a>
      </div>
    </nav>
  </header>

  <main class="form-page">
    <h1>Welcome back</h1>
    <p class="form-sub">Log in to book a car or manage your listings.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Log in</button>
      <p class="form-error" id="loginError"></p>
    </form>

    <p class="form-footer-link">
      Don't have an account? <a href="register.html">Sign up</a>
    </p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
