<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner dashboard — RoadShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="brand">Road<span>Share</span></a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </header>

  <main class="dashboard">
    <h1>Owner dashboard</h1>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="listings">My listings</button>
      <button class="tab-btn" data-tab="addCar">Add a car</button>
      <button class="tab-btn" data-tab="requests">Booking requests</button>
      <button class="tab-btn" data-tab="history">Rental history</button>
    </div>

    <section id="tab-listings" class="tab-panel active">
      <div class="car-grid" id="ownerCarGrid"></div>
    </section>

    <section id="tab-addCar" class="tab-panel">
      <form id="addCarForm" class="dashboard-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="make">Make</label>
            <input type="text" id="make" required>
          </div>
          <div class="form-group">
            <label for="model">Model</label>
            <input type="text" id="model" required>
          </div>
          <div class="form-group">
            <label for="year">Year</label>
            <input type="number" id="year" min="1980" required>
          </div>
          <div class="form-group">
            <label for="vehicleType">Vehicle type</label>
            <select id="vehicleType" required>
              <option value="sedan">Sedan</option>
              <option value="suv">SUV</option>
              <option value="truck">Truck</option>
              <option value="van">Van</option>
              <option value="coupe">Coupe</option>
              <option value="convertible">Convertible</option>
              <option value="hatchback">Hatchback</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pricePerDay">Price per day ($)</label>
            <input type="number" id="pricePerDay" min="1" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" required>
          </div>
        </div>
        <div class="form-group">
          <label for="imageUrl">Image URL</label>
          <input type="url" id="imageUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">List this car</button>
        <p class="form-error" id="addCarError"></p>
      </form>
    </section>

    <section id="tab-requests" class="tab-panel">
      <div id="requestsList"></div>
    </section>

    <section id="tab-history" class="tab-panel">
      <div id="historyList"></div>
    </section>
  </main>

  <div class="modal-overlay" id="editCarModal" hidden>
    <div class="modal-box">
      <h3>Edit listing</h3>
      <form id="editCarForm">
        <input type="hidden" id="editCarId">
        <div class="form-group">
          <label for="editMake">Make</label>
          <input type="text" id="editMake" required>
        </div>
        <div class="form-group">
          <label for="editModel">Model</label>
          <input type="text" id="editModel" required>
        </div>
        <div class="form-group">
          <label for="editYear">Year</label>
          <input type="number" id="editYear" min="1980" required>
        </div>
        <div class="form-group">
          <label for="editVehicleType">Vehicle type</label>
          <select id="editVehicleType" required>
            <option value="sedan">Sedan</option>
            <option value="suv">SUV</option>
            <option value="truck">Truck</option>
            <option value="van">Van</option>
            <option value="coupe">Coupe</option>
            <option value="convertible">Convertible</option>
            <option value="hatchback">Hatchback</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editPricePerDay">Price per day ($)</label>
          <input type="number" id="editPricePerDay" min="1" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="editLocation">Location</label>
          <input type="text" id="editLocation" required>
        </div>
        <div class="form-group">
          <label for="editImageUrl">Image URL</label>
          <input type="url" id="editImageUrl">
        </div>
        <div class="form-group">
          <label for="editDescription">Description</label>
          <textarea id="editDescription" rows="3"></textarea>
        </div>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <button type="button" class="btn btn-outline" id="closeEditModal">Cancel</button>
        </div>
        <p class="form-error" id="editCarError"></p>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/owner.js"></script>
</body>
</html>
